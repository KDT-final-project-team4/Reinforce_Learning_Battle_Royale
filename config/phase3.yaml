# Phase 3 설정 - 5인 FFA, 20x20 맵, 순위 보상

map:
  width: 20
  height: 20
  wall_count: 25
  wall_placement: "random"

agent:
  count: 5
  initial_hp: 100
  initial_attack: 10
  initial_defense: 0
  view_range: 7

items:
  enabled: true
  potion_heal: 30
  weapon_attack_bonus: 10
  armor_defense_bonus: 10
  respawn_interval: 20
  max_potions_on_map: 2
  max_weapons_on_map: 3
  max_armors_on_map: 3

zone:
  enabled: true
  shrink_start_step: 50
  shrink_interval: 30
  damage_per_step: 8

game:
  max_steps: 500
  simultaneous_actions: true

reward:
  # 이벤트 보상
  kill: 8.0
  death: -5.0
  damage_dealt: 1.5
  item_pickup: 2.0
  low_hp_potion_bonus: 3.0
  low_hp_potion_threshold: 0.5
  potion_use: 1.0
  zone_damage: -2.0
  survival_per_step: 0.05
  # 행동 보상
  approach_enemy: 0.1
  flee_hp_threshold: 0.4
  flee_bonus: 0.3
  disengage_bonus: 0.5
  disengage_hp_threshold: 0.4
  disengage_lookback: 5
  combo_bonus: 0.5
  # 페널티
  idle_penalty: -0.2
  wall_bump: -0.1
  attack_miss: -1.0
  oscillation_penalty: -0.15
  no_combat_penalty: -0.1
  no_combat_threshold: 30
  # 종료 보상
  ranking_rewards: [20, 10, 0, -5, -10]  # 1등~5등
  kill_streak_2: 1.0
  kill_streak_3: 2.0
  wasted_advantage_penalty: -3.0
  wasted_advantage_threshold: 2  # 킬 수 기준

training:
  algorithm: "PPO"
  total_timesteps: 2000000
  learning_rate: 0.0003
  n_envs: 6
  self_play: true
  opponent_update_interval: 20000
  net_arch: [128, 128]
  gamma: 0.995
  n_steps: 4096
  ent_coef: 0.01
