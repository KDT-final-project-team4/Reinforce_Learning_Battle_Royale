# Nexus Mode - 3v3 넥서스 파괴 모드
# 각 팀 3명 (탱커/딜러/힐러 각 1명), 상대 넥서스를 먼저 파괴하면 승리

mode: nexus

map:
  width: 20
  height: 20
  wall_count: 20
  wall_placement: "random"

agent:
  count: 6
  view_range: 9
  initial_hp: 100
  initial_attack: 10
  initial_defense: 0

team:
  num_teams: 2
  agents_per_team: 3  # 탱커 1 + 딜러 1 + 힐러 1
  friendly_fire: false

roles:
  tank:
    hp: 150
    attack: 12
    defense: 5
    attack_range: 1
    attack_cooldown_steps: 1
  dealer:
    hp: 70
    attack: 15
    defense: 0
    attack_range: 3
    ranged_damage_multiplier: 0.8
    attack_cooldown_steps: 2
  healer:
    hp: 100
    attack: 6
    defense: 2
    attack_range: 1
    heal_amount: 20
    potion_multiplier: 1.5
    heal_cooldown_steps: 3

nexus:
  hp: 500
  # 넥서스 위치 영역 (row_min, row_max, col_min, col_max)
  team_0_region: [1, 3, 1, 3]
  team_1_region: [16, 18, 16, 18]

minion:
  spawn_start_step: 15     # 게임 시작 후 15스텝부터 미니언 생성
  spawn_interval: 25       # 25스텝마다 웨이브 스폰
  per_wave: 2              # 팀당 웨이브당 2마리
  hp: 30
  attack: 5
  detection_range: 5       # 적 에이전트 감지 범위 (맨해튼 거리)
  max_per_team: 8          # 팀당 최대 미니언 수

respawn:
  base_time: 5             # 첫 사망 시 부활 대기 시간 (스텝)
  increment_per_death: 3   # 사망 횟수당 추가 대기 시간
  spawn_radius: 3          # 넥서스로부터 부활 반경

items:
  enabled: true
  potion_heal: 20
  weapon_attack_bonus: 5
  armor_defense_bonus: 4
  respawn_interval: 35
  item_expire_steps: 40
  max_potions_on_map: 3
  max_weapons_on_map: 2
  max_armors_on_map: 2

zone:
  enabled: false  # 넥서스 모드에서는 자기장 없음

game:
  max_steps: 600  # 넥서스 파괴까지 시간 필요
  simultaneous_actions: true

reward:
  # 넥서스 관련
  nexus_damage: 3.0           # 적 넥서스에 데미지 (per damage point는 아님, 공격 성공 시)
  own_nexus_damaged: -2.0     # 아군 넥서스 피격
  nexus_destroyed_win: 30.0   # 승리
  nexus_destroyed_loss: -20.0 # 패배
  # 전투
  kill: 5.0
  death: -5.0
  damage_dealt: 0.8
  # 아이템
  item_pickup: 1.5
  low_hp_potion_bonus: 2.0
  low_hp_potion_threshold: 0.5
  # 힐
  heal_ally: 1.5
  heal_low_hp_ally: 4.0
  heal_hp_threshold: 0.5
  # 미니언
  minion_kill: 1.0
  minion_kill_near_nexus: 2.0  # 아군 넥서스 근처에서 적 미니언 처치
  minion_kill_nexus_radius: 4  # "근처" 판정 반경
  # 행동
  approach_enemy_nexus: 0.05
  approach_enemy: 0.05
  approach_teammate: 0.0
  defend_nexus_bonus: 0.1
  defend_nexus_radius: 4
  idle_penalty: -0.03
  wall_bump: -0.1
  attack_miss: -0.2
  ranged_miss: -0.1
  invalid_action: -0.1
  oscillation_penalty: -0.05
  no_combat_penalty: -0.1
  no_combat_threshold: 40
  survival_per_step: 0.02
  combo_bonus: 0.3
  # 쿨다운
  attack_cooldown_penalty: -0.2
  heal_cooldown_penalty: -0.2
  # 팀 관련
  teammate_death: -2.0
  # 시간 초과 시 넥서스 HP 비율 보상
  timeout_nexus_advantage: 10.0
  timeout_nexus_disadvantage: -8.0

role_rewards:
  tank:
    defend_nexus_bonus: 0.3
    approach_enemy_nexus: 0.15
    approach_enemy: 0.15
    no_combat_penalty: -0.15
    no_combat_threshold: 30
  dealer:
    nexus_damage: 4.0
    approach_enemy_nexus: 0.1
    approach_enemy: 0.1
    ranged_miss: -0.05
    attack_miss: -0.15
  healer:
    heal_ally: 2.0
    heal_low_hp_ally: 6.0
    death: -8.0
    approach_teammate: 0.3
    nexus_damage: 1.0
    no_combat_penalty: -0.02
    no_combat_threshold: 80
    survival_per_step: 0.04

training:
  algorithm: "PPO"
  multi_policy: true
  num_rounds: 10
  steps_per_round: 300000
  total_timesteps: 3000000
  learning_rate: 0.0001
  n_envs: 8
  self_play: true
  opponent_update_interval: 25000
  net_arch: [256, 256]
  gamma: 0.995
  n_steps: 4096
  ent_coef: 0.02
