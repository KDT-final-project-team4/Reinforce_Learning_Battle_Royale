# Nexus Mode - 3v3 넥서스 파괴 모드
# 각 팀 3명 (탱커/딜러/힐러 각 1명), 상대 넥서스를 먼저 파괴하면 승리

mode: nexus

map:
  width: 20
  height: 20
  wall_count: 20
  wall_placement: "random"

agent:
  count: 10
  view_range: 9
  initial_hp: 100
  initial_attack: 10
  initial_defense: 0

team:
  num_teams: 2
  agents_per_team: 5  # 팀당 5명 (역할 조합은 코드에서 배정)
  friendly_fire: false

roles:
  tank:
    hp: 150
    attack: 10
    defense: 5
    attack_range: 2
    attack_cooldown_steps: 1
  dealer:
    hp: 70
    attack: 13
    defense: 0
    attack_range: 3
    ranged_damage_multiplier: 0.75
    attack_cooldown_steps: 2
  healer:
    hp: 100
    attack: 5
    defense: 2
    attack_range: 1
    heal_amount: 20
    potion_multiplier: 1.5
    heal_cooldown_steps: 3

nexus:
  hp: 1100
  # 넥서스 위치 영역 (row_min, row_max, col_min, col_max)
  team_0_region: [1, 3, 1, 3]
  team_1_region: [16, 18, 16, 18]

minion:
  spawn_start_step: 45     # 게임 시작 후 45스텝부터 미니언 생성
  spawn_interval: 100      # 100스텝마다 웨이브 스폰
  per_wave: 2              # 팀당 웨이브당 2마리
  hp: 12
  attack: 2
  detection_range: 5      # 적 에이전트 감지 범위 (맨해튼 거리)
  max_per_team: 6         # 팀당 최대 미니언 수

respawn:
  base_time: 5             # 첫 사망 시 부활 대기 시간 (스텝)
  increment_per_death: 3   # 사망 횟수당 추가 대기 시간
  spawn_radius: 3          # 넥서스로부터 부활 반경 (축소: 수비 복귀 빠르게)

items:
  enabled: true
  potion_heal: 20
  weapon_attack_bonus: 5
  armor_defense_bonus: 4
  respawn_interval: 35
  item_expire_steps: 40
  max_potions_on_map: 3
  max_weapons_on_map: 2
  max_armors_on_map: 2

zone:
  enabled: false  # 넥서스 모드에서는 자기장 없음

game:
  max_steps: 600  # 넥서스 파괴까지 시간 필요
  simultaneous_actions: true

reward:
  # 넥서스 관련
  nexus_damage: 10.0          # 넥서스 타격 유인을 크게 증가 (에이전트와의 1:1 교전 이탈 유도)
  own_nexus_damaged: -4.8     # 아군 넥서스 피격 패널티 강화 (수비 유도)
  nexus_destroyed_win: 30.0   # 승리
  nexus_destroyed_loss: -40.0 # 패배 패널티 강화 → 자기 넥서스 방치 억제
  # 전투
  kill: 40.0             # 교전/킬 보상 강화
  death: -15.0           # 죽음 패널티 더 강화 → 무리한 맞교환 억제
  damage_dealt: 1.2      # 평상시 교전 유도 강화 (초반 과도한 소극성 완화)
  # 아이템
  item_pickup: 12.0
  low_hp_potion_bonus: 16.0
  low_hp_potion_threshold: 0.5
  # 힐
  heal_ally: 1.5
  heal_low_hp_ally: 4.0
  heal_hp_threshold: 0.5
  # 미니언\
  minion_kill: 1.0
  minion_kill_near_nexus: 1.0  # 아군 넥서스 근처에서 적 미니언 처치
  minion_kill_nexus_radius: 3  # "근처" 판정 반경
  # 행동
  # 적/넥서스 접근 보상은 너무 크면 \"한 대 치고 이동\" 패턴이 강화되므로 완만하게 유지
  approach_enemy_nexus: 0.35
  approach_enemy: 0.4
  approach_minion: 0.1
  approach_teammate: 0.0
  defend_nexus_bonus: 0.7     # 우리 넥서스/팀원 방어 기여 우선 (approach_enemy_nexus보다 크게)
  defend_nexus_radius: 5
  stay_near_own_nexus_penalty: -0.08  # 적이 멀리 있을 때 자기 넥서스 근처에만 있으면 패널티
  stay_near_radius: 4                 # "넥서스 근처" 판정 반경
  stay_near_enemy_far: 6              # 적이 이 거리보다 멀면 "캠핑"으로 간주
  # 내 넥서스가 부실할 때 수비/복귀 유도
  own_nexus_low_hp_threshold: 0.6
  own_nexus_low_approach_enemy_nexus_mult: 0.03
  own_nexus_low_far_penalty_per_tile: -0.14
  idle_penalty: -0.12                 # 가만히 있는 것에 대한 패널티
  wall_bump: -0.1
  attack_miss: -0.2
  ranged_miss: -0.1
  invalid_action: -0.1
  oscillation_penalty: -0.05
  flee_hp_threshold: 0.62     # 이 비율 미만이면 도주(거리 증가) 보상
  flee_bonus: 2.3             # 저체력에서 후퇴 유인 매우 강하게
  flee_visible_mult: 2.8      # 시야에 적이 있을 때 후퇴 보상 추가 가중(치고 빠지기)
  # 저체력인데 공격을 넣으면 패널티(무리한 맞교환 억제)
  low_hp_combat_threshold: 0.45
  low_hp_combat_penalty: -1.1
  # 시야 안에 적 에이전트가 있을 때: 적 쪽 유인↑, 적 넥서스만 향하는 유인↓
  visible_enemy_approach_mult: 1.25
  visible_enemy_nexus_mult: 0.42
  adjacent_enemy_nexus_bonus: 0.25
  # 넥서스가 매우 낮을 때(마무리)는 넥서스 타격을 더 유리하게 만든다.
  # - 넥서스 인접해도 다른 적을 때리느라 넥서스를 놓치는 패턴을 완화
  # - no_combat 타이머 리셋도 마무리 구간에서만 허용(치고만 다니는 부작용 방지)
  finisher_enemy_nexus_hp_threshold: 0.25
  finisher_nexus_damage_multiplier: 1.6
  no_combat_penalty: -3.5
  no_combat_threshold: 35 # 무전투 패널티를 더 빨리 적용해 교전 유도
  survival_per_step: 0.03 # 살아남는 것에 소량 보상 (생존 우선도 약간 증가)
  combo_bonus: 0.0        # 연속 공격(콤보) 자체 보상 제거
  # 치고 빠지기(무한 교전 억제)
   
  hit_and_run_consecutive_hits_threshold: 2
  
  # ==== 양방향 shaping ====
  # 연속으로 데미지를 넣는데도 거리(dist)가 늘지 않으면 패널티
  hit_and_run_disengage_penalty: -0.95
  # 연속으로 공격 중 데미지를 넓히면 보상
  hit_and_run_disengage_reward: 0.45
  # 쿨다운(공격이나 힐을 계속 시도하는 것에 대한 패널티)
  attack_cooldown_penalty: -1.5   # 쿨다운 타이밍 실수 패널티 완화
  heal_cooldown_penalty: -2.0
  # 팀 관련
  teammate_death: -14.0
  # 시간 초과 시 넥서스 HP 비율 보상
  timeout_nexus_advantage: 10.0
  timeout_nexus_disadvantage: -8.0

role_rewards:
  tank:
    defend_nexus_bonus: 0.9
    damage_dealt: 1.0
    combo_bonus: 0.0
    flee_bonus: 3.2
    flee_visible_mult: 3.5
    low_hp_combat_penalty: -1.25
    item_pickup: 14.0
    approach_enemy_nexus: 0.8
    approach_enemy: 1.5
    nexus_damage: 14.0
    approach_minion: 0.45
    minion_kill: 2.0
    minion_kill_near_nexus: 2.0
    no_combat_penalty: -5.0
    no_combat_threshold: 35
    attack_cooldown_penalty: -0.4
    attack_miss: -0.05
    visible_enemy_approach_mult: 1.8
    visible_enemy_nexus_mult: 0.22
    adjacent_enemy_nexus_bonus: 0.4
  dealer:
    nexus_damage: 16.0
    approach_enemy_nexus: 1.15
    approach_enemy: 1.6
    damage_dealt: 1.15
    combo_bonus: 0.0
    flee_bonus: 2.8
    flee_visible_mult: 3.0
    low_hp_combat_penalty: -1.5
    visible_enemy_approach_mult: 1.55
    visible_enemy_nexus_mult: 0.45
    ranged_miss: -0.02
    attack_miss: -0.05
    attack_cooldown_penalty: -0.3
    no_combat_penalty: -4.6
    no_combat_threshold: 36
    approach_minion: 0.55
    minion_kill: 2.0
    minion_kill_near_nexus: 2.0
    adjacent_enemy_nexus_bonus: 0.7
  healer:
    heal_ally: 12.5
    heal_low_hp_ally: 16.0
    death: -8.0
    low_hp_combat_penalty: -0.8
    visible_enemy_approach_mult: 1.0
    visible_enemy_nexus_mult: 1.0
    flee_bonus: 2.4
    flee_visible_mult: 2.8
    approach_teammate: 1.8
    approach_minion: 0.05
    minion_kill: 0.8
    minion_kill_near_nexus: 0.8
    nexus_damage: 2.4
    no_combat_penalty: -9.0
    no_combat_threshold: 45
    adjacent_enemy_nexus_bonus: 0.35
    
training:
  algorithm: "PPO"
  multi_policy: true
  num_rounds: 2
  steps_per_round: 30000
  total_timesteps: 30000000        
  learning_rate: 0.0001
  n_envs: 8                       
  self_play: true
  opponent_update_interval: 150000
  net_arch: [256, 256]            
  gamma: 0.999
  n_steps: 4096               
  ent_coef: 0.05 # 초반 탐험 강화