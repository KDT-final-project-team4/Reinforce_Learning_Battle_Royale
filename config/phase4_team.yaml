# Phase 4 설정 - 2:2:2 팀 배틀로얄, 역할 시스템, 원거리 공격

map:
  width: 20
  height: 20
  wall_count: 25
  wall_placement: 'random'

agent:
  count: 6
  view_range: 9
  # 기본 스탯 (역할별로 오버라이드됨)
  initial_hp: 100
  initial_attack: 10
  initial_defense: 0

team:
  num_teams: 3
  agents_per_team: 2
  friendly_fire: false

roles:
  tank:
    hp: 150
    attack: 12
    defense: 5
    attack_range: 1
    attack_cooldown_steps: 1  # 근접 공격 후 1스텝 쿨다운
  dealer:
    hp: 70
    attack: 15
    defense: 0
    attack_range: 3
    ranged_damage_multiplier: 0.8
    attack_cooldown_steps: 2  # 원거리 공격 후 2스텝 쿨다운
  healer:
    hp: 100
    attack: 6
    defense: 2
    attack_range: 1
    heal_amount: 20
    potion_multiplier: 1.5
    heal_cooldown_steps: 3 # 힐 후 3스텝 쿨다운

items:
  enabled: true
  potion_heal: 20
  weapon_attack_bonus: 5
  armor_defense_bonus: 4
  respawn_interval: 35 # 20→35 아이템 리젠 간격 늘림 (파밍 억제)
  item_expire_steps: 40 # 40스텝 미획득 시 아이템 소멸
  max_potions_on_map: 2 # 3→2 맵 위 아이템 수 축소
  max_weapons_on_map: 2 # 3→2
  max_armors_on_map: 2 # 3→2

zone:
  enabled: true
  shrink_start_step: 60
  shrink_interval: 30
  damage_per_step: 10
  min_safe_radius: 4 # 안전지대 최소 반경 (8×8 중앙 영역 항상 보장)

game:
  max_steps: 400 # 600→400 게임 길이 단축
  simultaneous_actions: true

reward:
  # 이벤트 보상 (v2: 전투↓ 생존↑ 밸런스 조정)
  kill: 8.0 # 10→8 전투 지배력 완화
  death: -8.0
  damage_dealt: 1.0 # 2→1 가장 큰 전투 보상 반감
  item_pickup: 2.0 # 3→2 아이템 보상 하향 (파밍 지배력 완화)
  low_hp_potion_bonus: 3.0 # 4→3 저체력 포션 보상 소폭 하향
  low_hp_potion_threshold: 0.5
  zone_damage: -4.0
  survival_per_step: 0.03 # 0.01→0.03 생존 보상 3배
  # 행동 보상
  approach_enemy: 0.1
  flee_hp_threshold: 0.3
  flee_bonus: 0.1
  disengage_bonus: 0.2
  disengage_hp_threshold: 0.4
  disengage_lookback: 5
  combo_bonus: 0.3 # 0.5→0.3 콤보 보상 하향
  # 페널티
  idle_penalty: -0.05
  wall_bump: -0.1
  attack_miss: -0.3
  oscillation_penalty: -0.05
  no_combat_penalty: -0.3
  no_combat_threshold: 20
  invalid_action: -0.1
  ranged_miss: -0.2
  # 팀 보상
  team_win: 15.0
  team_eliminated: -8.0
  teammate_death: -3.0
  heal_ally: 1.5
  heal_low_hp_ally: 3.0
  heal_hp_threshold: 0.4
  # 종료 보상
  team_ranking_rewards: [15, 3, -8] # 1등팀, 2등팀, 3등팀
  kill_streak_2: 1.0
  kill_streak_3: 2.0
  wasted_advantage_penalty: -3.0
  wasted_advantage_threshold: 2

# 역할별 보상 오버라이드 (base reward 위에 덮어씀)
role_rewards:
  tank:
    approach_enemy: 0.3 # 0.2→0.3 접근 시 순보상 양수화 (no_combat 상쇄)
    no_combat_penalty: -0.15 # -0.3→-0.15 매스텝 누적이므로 반감해도 충분
    no_combat_threshold: 40 # 20→40 근접 역할 맵 이동 시간 확보
    idle_penalty: -0.05 # -0.08→-0.05 no_combat과 이중 페널티 해소

  dealer:
    approach_enemy: 0.1 # 기본값 유지
    no_combat_penalty: -0.2 # 유지
    no_combat_threshold: 35 # 25→35 교전 사이 이동 시간 여유
    ranged_miss: -0.05 # -0.2→-0.05 원거리 시도 억제 완화 (빗나감 페널티 과다)
    attack_miss: -0.15 # base -0.3→-0.15 근접 미스 과다 페널티 완화

  healer:
    # 힐러 = 팀 케어 특화 (v2: 생존+힐+팀원 접근 대폭 강화)
    death: -12.0 # -8→-12 힐러 사망 강력 페널티
    damage_dealt: 0.5 # 1.0→0.5 전투보다 힐 유도
    no_combat_penalty: -0.02 # -0.05→-0.02 힐러는 싸울 필요 없음
    no_combat_threshold: 80 # 50→80 비전투 허용 대폭 확대
    idle_penalty: -0.01
    attack_miss: -0.02 # -0.05→-0.02 공격 자체를 덜 페널티
    # 적 접근 제거, 팀원 접근 강화
    approach_enemy: 0.0
    approach_teammate: 0.4 # 0.2→0.4 팀원 찾아가기 핵심 보상
    # 힐 보상: 체력 낮은 팀원 힐만 보상, 풀피 힐 억제
    heal_ally: -0.5 # 3.5→-0.5 체력 높은 팀원 힐은 소폭 페널티 (풀피 힐 억제)
    heal_low_hp_ally: 7.0 # 유지 위급한 팀원 힐 최우선
    heal_hp_threshold: 0.7 # 0.5→0.7 70% 이하일 때만 고보상 트리거 (범위 확대)
    # 팀 관련 보상 강화
    teammate_death: -5.0 # -3.0→-5.0 팀원 죽으면 힐러 책임
    # 생존 = 힐러의 최대 가치
    survival_per_step: 0.05 # 0.02→0.05 살아있는 것 자체가 보상

training:
  algorithm: 'PPO'
  multi_policy: true
  # 멀티 정책: 라운드 로빈 설정
  num_rounds: 7 # 이전 학습 3라운드 완료 → 나머지 7라운드
  steps_per_round: 300000 # 한 역할당 라운드당 스텝 → 역할당 총 2.1M 추가
  # 공통 하이퍼파라미터
  total_timesteps: 3000000 # 단일 정책 호환용
  learning_rate: 0.0001
  n_envs: 8
  self_play: true
  opponent_update_interval: 25000
  net_arch: [256, 256]
  gamma: 0.995
  n_steps: 4096
  ent_coef: 0.02 # 0.015→0.02 Tank/Dealer 조기 수렴 방지
