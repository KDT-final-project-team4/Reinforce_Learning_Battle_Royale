# Phase 4 설정 - 2:2:2 팀 배틀로얄, 역할 시스템, 원거리 공격

map:
  width: 20
  height: 20
  wall_count: 25
  wall_placement: 'random'

agent:
  count: 6
  view_range: 9
  # 기본 스탯 (역할별로 오버라이드됨)
  initial_hp: 100
  initial_attack: 10
  initial_defense: 0

team:
  num_teams: 3
  agents_per_team: 2
  friendly_fire: false

roles:
  tank:
    hp: 150
    attack: 12
    defense: 5
    attack_range: 1
    attack_cooldown_steps: 1
  dealer:
    hp: 70
    attack: 15
    defense: 0
    attack_range: 3
    ranged_damage_multiplier: 0.8
    attack_cooldown_steps: 1  # 2→1 쿨다운 완화 (DPS 향상)
  healer:
    hp: 100
    attack: 6
    defense: 2
    attack_range: 1
    heal_amount: 20
    potion_multiplier: 1.5
    heal_cooldown_steps: 3

items:
  enabled: true
  potion_heal: 20
  weapon_attack_bonus: 5
  armor_defense_bonus: 4
  respawn_interval: 35
  item_expire_steps: 40
  max_potions_on_map: 2
  max_weapons_on_map: 2
  max_armors_on_map: 2

zone:
  enabled: true
  shrink_start_step: 40
  shrink_interval: 20
  damage_per_step: 10
  min_safe_radius: 2

game:
  max_steps: 400
  simultaneous_actions: true

reward:
  kill: 10.0
  death: -10.0
  damage_dealt: 1.5
  item_pickup: 2.0
  low_hp_potion_bonus: 3.0
  low_hp_potion_threshold: 0.5
  zone_damage: -4.0
  survival_per_step: 0.02
  # 행동 보상
  approach_enemy: 0.3
  flee_hp_threshold: 0.3
  flee_bonus: 0.2
  disengage_bonus: 0.3
  disengage_hp_threshold: 0.4
  disengage_lookback: 5
  combo_bonus: 0.5
  # 페널티
  idle_penalty: -0.05
  wall_bump: -0.1
  attack_miss: -0.2
  oscillation_penalty: -0.05
  no_combat_penalty: -0.1
  no_combat_threshold: 30
  invalid_action: -0.1
  ranged_miss: -0.2
  # 팀 보상
  team_win: 20.0
  team_eliminated: -8.0
  teammate_death: -3.0
  heal_ally: 1.5
  heal_low_hp_ally: 3.0
  heal_hp_threshold: 0.4
  # 종료 보상
  team_ranking_rewards: [20, 3, -10]
  kill_streak_2: 1.0
  kill_streak_3: 2.0
  wasted_advantage_penalty: -3.0
  wasted_advantage_threshold: 2

# 역할별 보상 오버라이드 (base reward 위에 덮어씀)
role_rewards:
  tank:
    approach_enemy: 0.6
    attack_miss: -0.3
    damage_dealt: 2.0
    combo_bonus: 0.8
    kill: 12.0
    no_combat_penalty: -0.05
    no_combat_threshold: 50
    idle_penalty: -0.05

  dealer:
    approach_enemy: 0.35
    no_combat_penalty: -0.04
    no_combat_threshold: 55
    ranged_miss: -0.05
    attack_miss: -0.15
    combo_bonus: 0.8
    damage_dealt: 2.2
    item_pickup: 1.0
    # 딜러 생존 강화 (HP 70이라 교전 시 취약)
    death: -12.0
    flee_bonus: 0.3
    disengage_bonus: 0.4

  healer:
    # 힐러 = 팀 케어 + 최소한의 전투 참여
    death: -12.0
    damage_dealt: 0.8
    item_pickup: 0.5
    no_combat_penalty: -0.03
    no_combat_threshold: 60
    idle_penalty: -0.01
    attack_miss: -0.15           # -0.02→-0.15 허공 공격 강력 억제 (110회 0% 명중 방지)
    approach_enemy: 0.1          # 0.0→0.1 적 접근 인센티브 (명중하려면 접근 필요)
    approach_teammate: 0.4
    heal_ally: -0.5
    heal_low_hp_ally: 7.0
    heal_hp_threshold: 0.7
    teammate_death: -5.0
    survival_per_step: 0.02      # 0.05→0.02 소극적 플레이 방지 (base와 동일)

training:
  algorithm: 'PPO'
  multi_policy: true
  num_rounds: 10
  steps_per_round: 300000
  total_timesteps: 3000000
  learning_rate: 0.0001
  n_envs: 8
  self_play: true
  opponent_update_interval: 25000
  net_arch: [256, 256]
  gamma: 0.995
  n_steps: 4096
  ent_coef: 0.02
