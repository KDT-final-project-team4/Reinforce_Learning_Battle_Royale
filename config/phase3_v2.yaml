# Phase 3 v2 설정 - 도주 전략 억제, 전투 강화
# 변경점: survival 고정값화, flee/disengage 약화, zone 패널티 강화

map:
  width: 20
  height: 20
  wall_count: 25
  wall_placement: 'random'

agent:
  count: 5
  initial_hp: 100
  initial_attack: 10
  initial_defense: 0
  view_range: 9

items:
  enabled: true
  potion_heal: 30
  weapon_attack_bonus: 10
  armor_defense_bonus: 10
  respawn_interval: 20
  max_potions_on_map: 2
  max_weapons_on_map: 3
  max_armors_on_map: 3

zone:
  enabled: true
  shrink_start_step: 50
  shrink_interval: 30
  damage_per_step: 8

game:
  max_steps: 500
  simultaneous_actions: true

reward:
  # 이벤트 보상
  kill: 10.0               # 8.0 → 10.0 (전투 보상 강화)
  death: -5.0
  damage_dealt: 2.0        # 1.5 → 2.0 (전투 보상 강화)
  item_pickup: 2.0
  low_hp_potion_bonus: 3.0
  low_hp_potion_threshold: 0.5
  potion_use: 1.0
  zone_damage: -4.0        # -2.0 → -4.0 (자기장 버티기 억제)
  survival_per_step: 0.01  # 0.05 → 0.01, HP 비례 로직도 제거됨 (battle_env.py 수정)
  # 행동 보상
  approach_enemy: 0.1
  flee_hp_threshold: 0.3   # 0.4 → 0.3 (극한 상황에서만 도주 보상)
  flee_bonus: 0.1          # 0.3 → 0.1 (도주 인센티브 약화)
  disengage_bonus: 0.2     # 0.5 → 0.2 (이중 도주 보상 약화)
  disengage_hp_threshold: 0.4
  disengage_lookback: 5
  combo_bonus: 0.5
  # 페널티
  idle_penalty: -0.05      # -0.2 → -0.05 (헛공격 유발 방지)
  wall_bump: -0.1
  attack_miss: -0.3        # -1.0 → -0.3 (헛공격 유발 방지)
  oscillation_penalty: -0.05  # -0.15 → -0.05
  no_combat_penalty: -0.3  # -0.1 → -0.3 (전투 회피 억제)
  no_combat_threshold: 20  # 30 → 20 (더 빨리 페널티)
  # 종료 보상
  ranking_rewards: [20, 10, 0, -5, -10]
  kill_streak_2: 1.0
  kill_streak_3: 2.0
  wasted_advantage_penalty: -3.0
  wasted_advantage_threshold: 2

training:
  algorithm: 'PPO'
  total_timesteps: 2000000
  learning_rate: 0.0001    # 0.0003 → 0.0001 (기존 모델 이어받기 시 안정적 수렴)
  n_envs: 6
  self_play: true
  opponent_update_interval: 20000
  net_arch: [128, 128]
  gamma: 0.995
  n_steps: 4096
  ent_coef: 0.01
